name: publish

on:
  push:
    branches: ["main"]
  schedule:
    # weekly refresh so upstream CRD fixes republish without a commit
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Install dependencies
        run: pip install --quiet pyyaml

      - name: Generate catalog
        run: python3 scripts/generate.py --output-dir site

      # Additive publish: new files land, changed files update, but files
      # missing from this build (e.g. pinned tiers of versions that aged out
      # of extraVersions) are never deleted — published URLs stay permanent.
      - name: Commit to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add pages origin/gh-pages
          cp -R site/. pages/
          cd pages
          git add -A
          if git diff --cached --quiet; then
            echo "no schema changes to publish"
          else
            git commit -m "publish: ${GITHUB_SHA::12}"
            git push origin HEAD:gh-pages
          fi
