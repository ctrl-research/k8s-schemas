<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>k8s-schemas</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1f24; --muted: #5c6670; --line: #e2e6ea;
    --card: #f6f8fa; --accent: #0969da; --accent-fg: #ffffff; --badge: #dbe9f9;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101418; --fg: #d8dee5; --muted: #8b949e; --line: #2b3138;
      --card: #171c22; --accent: #58a6ff; --accent-fg: #0b0f14; --badge: #1c2c40;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg);
         font: 15px/1.5 var(--mono); }
  .wrap { max-width: 70rem; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
  header h1 { font-size: 1.3rem; margin: 0 0 .25rem; }
  header p { color: var(--muted); margin: 0 0 1rem; font-size: .85rem; }
  header a { color: var(--accent); }
  .controls { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  input[type=search], select {
    font: inherit; color: var(--fg); background: var(--card);
    border: 1px solid var(--line); border-radius: 6px; padding: .45rem .6rem;
  }
  input[type=search] { flex: 1; min-width: 14rem; }
  .count { color: var(--muted); font-size: .8rem; margin: 0 0 .5rem; }
  ul.results { list-style: none; margin: 0; padding: 0; }
  ul.results li {
    border: 1px solid var(--line); border-radius: 8px; background: var(--card);
    padding: .6rem .8rem; margin-bottom: .5rem;
  }
  .kind { font-weight: 600; }
  .group { color: var(--muted); font-size: .85rem; }
  .desc { color: var(--muted); font-size: .8rem; margin: .2rem 0 .35rem;
          overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2;
          -webkit-box-orient: vertical; }
  .chips { display: flex; flex-wrap: wrap; gap: .3rem; }
  .chip {
    font: inherit; font-size: .75rem; cursor: pointer; border-radius: 999px;
    border: 1px solid var(--line); background: var(--badge); color: var(--fg);
    padding: .1rem .6rem;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.latest { border-color: var(--accent); }
  #detail { border: 1px solid var(--line); border-radius: 8px;
            background: var(--card); padding: 1rem; }
  #detail .back { color: var(--accent); cursor: pointer; background: none;
                  border: none; font: inherit; padding: 0; margin-bottom: .75rem; }
  #detail h2 { margin: 0; font-size: 1.1rem; }
  .urlbox { display: flex; gap: .4rem; align-items: center; margin: .6rem 0;
            flex-wrap: wrap; }
  .urlbox code { background: var(--bg); border: 1px solid var(--line);
                 border-radius: 6px; padding: .3rem .5rem; font-size: .78rem;
                 overflow-x: auto; white-space: nowrap; max-width: 100%; }
  .btn { font: inherit; font-size: .75rem; cursor: pointer; border-radius: 6px;
         border: 1px solid var(--line); background: var(--accent);
         color: var(--accent-fg); padding: .25rem .6rem; white-space: nowrap; }
  .btn.ghost { background: var(--card); color: var(--accent); }
  .tree { margin-top: 1rem; font-size: .85rem; }
  .tree details { margin-left: 1rem; border-left: 1px solid var(--line);
                  padding-left: .5rem; }
  .tree > details { margin-left: 0; border-left: none; padding-left: 0; }
  .tree summary { cursor: pointer; padding: .1rem 0; }
  .tree summary::marker { color: var(--muted); }
  .prop { font-weight: 600; }
  .req { color: #d1242f; } @media (prefers-color-scheme: dark) { .req { color: #ff7b72; } }
  .type { color: var(--accent); font-size: .78rem; }
  .enum, .pdesc { color: var(--muted); font-size: .78rem; margin: .1rem 0 .3rem 1.2rem; }
  .leaf { padding: .1rem 0 .1rem 1rem; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>k8s-schemas</h1>
    <p>JSON Schemas for Kubernetes CRDs, generated from upstream charts and manifests.
       <a href="catalog.json">catalog.json</a> &middot;
       <a href="https://github.com/ctrl-research/k8s-schemas">source</a></p>
  </header>

  <div id="browse">
    <div class="controls">
      <input id="q" type="search" placeholder="Search kind, group, or source…" autofocus>
      <select id="src"><option value="">all sources</option></select>
    </div>
    <p class="count" id="count"></p>
    <ul class="results" id="results"></ul>
  </div>

  <section id="detail" class="hidden"></section>
</div>

<script>
"use strict";
const $ = (sel) => document.querySelector(sel);
const state = { entries: [], kinds: [], query: "", source: "" };

function baseUrl() {
  return location.origin + location.pathname.replace(/[^/]*$/, "");
}

function typeOf(schema) {
  if (!schema) return "";
  if (schema.oneOf) return schema.oneOf.map((s) => s.type).filter(Boolean).join(" | ");
  if (Array.isArray(schema.type)) return schema.type.join(" | ");
  if (schema.type === "array") {
    const inner = typeOf(schema.items);
    return inner ? `array<${inner}>` : "array";
  }
  return schema.type || "";
}

function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") node.className = v;
    else if (k.startsWith("on")) node.addEventListener(k.slice(2), v);
    else node.setAttribute(k, v);
  }
  node.append(...children);
  return node;
}

/* ---------- browse view ---------- */

function groupCatalog(entries) {
  const map = new Map();
  for (const entry of entries) {
    const key = `${entry.group}/${entry.kind}`;
    if (!map.has(key)) {
      map.set(key, { group: entry.group, kind: entry.kind,
                     description: entry.description || "", entries: [] });
    }
    const kindRow = map.get(key);
    kindRow.entries.push(entry);
    if (!kindRow.description && entry.description) kindRow.description = entry.description;
  }
  return [...map.values()].sort((a, b) =>
    a.kind.localeCompare(b.kind) || a.group.localeCompare(b.group));
}

function matches(kindRow) {
  const query = state.query.toLowerCase();
  if (state.source &&
      !kindRow.entries.some((e) => e.source === state.source)) return false;
  if (!query) return true;
  return (kindRow.kind + " " + kindRow.group + " " +
          kindRow.entries.map((e) => e.source).join(" ")).toLowerCase().includes(query);
}

function chipLabel(entry) {
  return `${entry.version} · ${entry.source}@${entry.sourceVersion}`;
}

function renderList() {
  const results = $("#results");
  results.textContent = "";
  const visible = state.kinds.filter(matches);
  const shown = visible.slice(0, 100);
  $("#count").textContent =
    `${visible.length} kinds, ${state.entries.length} schemas` +
    (visible.length > shown.length ? ` — showing first ${shown.length} kinds` : "");
  for (const kindRow of shown) {
    const chips = kindRow.entries
      .filter((e) => !state.source || e.source === state.source)
      .sort((a, b) => (b.latestPath ? 1 : 0) - (a.latestPath ? 1 : 0) ||
                      chipLabel(a).localeCompare(chipLabel(b)))
      .map((e) => el("button",
        { class: "chip" + (e.latestPath ? " latest" : ""),
          title: e.latestPath ? "latest tier" : "pinned tier",
          onclick: () => { location.hash = "#s=" + e.pinnedPath; } },
        chipLabel(e) + (e.latestPath ? " ★" : "")));
    results.append(el("li", {},
      el("div", {}, el("span", { class: "kind" }, kindRow.kind), " ",
                    el("span", { class: "group" }, kindRow.group)),
      kindRow.description ? el("div", { class: "desc" }, kindRow.description) : "",
      el("div", { class: "chips" }, ...chips)));
  }
}

/* ---------- detail view ---------- */

function copyButton(label, text) {
  return el("button", { class: "btn", onclick: (ev) => {
    navigator.clipboard.writeText(text);
    ev.target.textContent = "copied!";
    setTimeout(() => { ev.target.textContent = label; }, 1200);
  } }, label);
}

function propNode(name, schema, requiredSet) {
  const label = el("span", {},
    el("span", { class: "prop" + (requiredSet.has(name) ? " req" : "") }, name),
    " ", el("span", { class: "type" }, typeOf(schema)));
  const children = schema.properties ||
    (schema.items && schema.items.properties ? schema.items.properties : null);
  const childRequired = new Set(
    schema.required || (schema.items && schema.items.required) || []);
  const meta = [];
  if (schema.description) meta.push(el("div", { class: "pdesc" }, schema.description));
  if (schema.enum) meta.push(el("div", { class: "enum" }, "enum: " + schema.enum.join(", ")));
  if (!children) return el("div", { class: "leaf" }, label, ...meta);
  const node = el("details", {}, el("summary", {}, label), ...meta);
  let loaded = false;
  node.addEventListener("toggle", () => {   // lazy: big CRDs have 10k+ props
    if (!node.open || loaded) return;
    loaded = true;
    for (const key of Object.keys(children).sort()) {
      node.append(propNode(key, children[key], childRequired));
    }
  });
  return node;
}

async function renderDetail(path) {
  const entry = state.entries.find((e) => e.pinnedPath === path ||
                                          e.latestPath === path);
  const detail = $("#detail");
  detail.textContent = "";
  $("#browse").classList.add("hidden");
  detail.classList.remove("hidden");
  detail.append(el("button", { class: "back",
    onclick: () => { location.hash = ""; } }, "← all schemas"));
  const url = baseUrl() + path;
  const title = entry ? `${entry.kind} (${entry.group}/${entry.version})` : path;
  detail.append(el("h2", {}, title));
  if (entry) {
    detail.append(el("p", { class: "group" },
      `from ${entry.source}@${entry.sourceVersion}` +
      (entry.latestPath ? " · also served on the latest tier" : "")));
    if (entry.latestPath) {
      const latestUrl = baseUrl() + entry.latestPath;
      detail.append(el("div", { class: "urlbox" }, el("code", {}, latestUrl),
        copyButton("copy url", latestUrl),
        copyButton("copy modeline", `# yaml-language-server: $schema=${latestUrl}`)));
    }
    detail.append(el("div", { class: "urlbox" }, el("code", {}, url),
      copyButton("copy url", url),
      copyButton("copy modeline", `# yaml-language-server: $schema=${url}`),
      el("a", { href: url, target: "_blank" },
        el("button", { class: "btn ghost" }, "raw json"))));
  }
  const tree = el("div", { class: "tree" }, "loading schema…");
  detail.append(tree);
  try {
    const schema = await (await fetch(path)).json();
    tree.textContent = "";
    const required = new Set(schema.required || []);
    for (const key of Object.keys(schema.properties || {}).sort()) {
      tree.append(propNode(key, schema.properties[key], required));
    }
    if (!schema.properties) tree.textContent = "schema has no properties";
  } catch (err) {
    tree.textContent = "failed to load schema: " + err;
  }
}

/* ---------- routing + init ---------- */

function route() {
  const match = location.hash.match(/^#s=(.+)$/);
  if (match) {
    renderDetail(decodeURIComponent(match[1]));
  } else {
    $("#detail").classList.add("hidden");
    $("#browse").classList.remove("hidden");
  }
}

async function init() {
  const catalog = await (await fetch("catalog.json")).json();
  state.entries = catalog.schemas;
  state.kinds = groupCatalog(state.entries);
  const sources = [...new Set(state.entries.map((e) => e.source))].sort();
  for (const source of sources) {
    $("#src").append(el("option", { value: source }, source));
  }
  $("#q").addEventListener("input", (ev) => {
    state.query = ev.target.value.trim(); renderList();
  });
  $("#src").addEventListener("change", (ev) => {
    state.source = ev.target.value; renderList();
  });
  window.addEventListener("hashchange", route);
  renderList();
  route();
}

init().catch((err) => {
  $("#count").textContent = "failed to load catalog.json: " + err;
});
</script>
</body>
</html>
